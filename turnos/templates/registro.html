{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h2>Registro de Nuevo Paciente</h2>
    <p>Crea tu cuenta para poder reservar horas médicas.</p>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Registrarse</button>
    </form>
</div>
{% endblock %}
